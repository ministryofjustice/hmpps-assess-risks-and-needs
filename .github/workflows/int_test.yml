name: Integration Test

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      environment:
        description: Environment
        type: string
        required: true
        default: 'dev'

permissions:
  contents: read

jobs:
  inttest:
    if: ${{ inputs.environment == 'dev' }}
    runs-on: [ self-hosted, hmpps-github-actions-runner ]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - run: java --version
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run integration tests
        run: ./gradlew integrationTest
        env:
          AAP_UI_CLIENT_ID: ${{ secrets.ARNS_ASSESSMENT_CLIENT_ID }}
          AAP_UI_CLIENT_SECRET: ${{ secrets.ARNS_ASSESSMENT_CLIENT_SECRET }}

      - name: Upload test results
        if: '!cancelled()'
        uses: actions/upload-artifact@v5
        with:
          name: test_results
          path: |
            build/test_results
            build/reports/tests
      
